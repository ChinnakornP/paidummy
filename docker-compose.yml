services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: paidummy
      POSTGRES_USER: paidummy
      POSTGRES_PASSWORD: paidummy
    ports:
      - "5440:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paidummy"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6390:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  pgdata: {}
